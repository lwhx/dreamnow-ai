name: Build EXE (Nuitka)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: false
        default: '1.0.0'
  push:
    branches: [main]
    tags:
      - 'v*'
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 安装 Nuitka
        run: pip install nuitka

      - name: 安装 MinGW-w64 (Nuitka 需要 C 编译器)
        run: choco install mingw -y

      - name: 使用 Nuitka 编译
        run: |
          python -m nuitka --standalone `
            --onefile `
            --windows-disable-console `
            --remove-output `
            --assume-yes-for-downloads `
            --lto=auto `
            "即梦AI生图.py"

      - name: 检查编译输出
        run: Get-ChildItem -Path "." -Filter "*.exe" -Recurse | Select-Object FullName, Length

      - name: 查找 EXE 文件并打包
        run: |
          $exe = Get-ChildItem -Path "." -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            Write-Host "Found EXE: $($exe.FullName)"
            Compress-Archive -Path $exe.FullName -DestinationPath "jimeng-ai-win64.zip"
          } else {
            Write-Host "No EXE found!"
            exit 1
          }

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: jimeng-ai-win64
          path: jimeng-ai-win64.zip

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: jimeng-ai-win64
          path: .

      - name: 发布 Release
        uses: softprops/action-gh-release@v1
        with:
          files: jimeng-ai-win64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}